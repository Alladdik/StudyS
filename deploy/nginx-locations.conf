# Shared nginx location blocks for LTropik
# Placed at: /etc/nginx/snippets/ltropik-locations.conf
# Included by both HTTP and HTTPS server blocks

# Gzip
gzip on;
gzip_vary on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
gzip_min_length 1024;
gzip_comp_level 6;

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# React SPA — serve index.html for all routes
location / {
    root /opt/ltropik/frontend;
    index index.html;
    try_files $uri $uri/ /index.html;
    # Never cache the HTML entry point
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}

# Static assets — 1 year immutable cache
location ~* \.(js|css|woff|woff2|eot|ttf)$ {
    root /opt/ltropik/frontend;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Images — 30 days cache
location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
    root /opt/ltropik/frontend;
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
}

# REST API proxy
location /api/ {
    proxy_pass         http://ltropik_backend/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    client_max_body_size 50m;
}

# SignalR WebSocket hubs
location ~* ^/(hubs/review|hubs/room|hubs/notifications) {
    proxy_pass         http://ltropik_backend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 7200s;
    proxy_send_timeout 7200s;
}

# Telegram webhook (no auth headers stripped)
location /api/telegram/ {
    proxy_pass         http://ltropik_backend/api/telegram/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}

# User uploads (served directly — 7 days cache)
location /uploads/ {
    alias /opt/ltropik/media/uploads/;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
}

# Health endpoint (no access log)
location = /health {
    proxy_pass http://ltropik_backend/api/health;
    access_log off;
}
