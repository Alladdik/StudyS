# LTropik nginx virtual host
# Copy to: /etc/nginx/sites-available/ltropik
# Enable: ln -s /etc/nginx/sites-available/ltropik /etc/nginx/sites-enabled/ltropik

upstream ltropik_backend {
    server 127.0.0.1:5090;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ltropik.duckdns.org;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ltropik.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/ltropik.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ltropik.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    include /etc/nginx/snippets/ltropik-locations.conf;
}
