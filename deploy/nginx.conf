# LTropik nginx virtual host
# Copy to: /etc/nginx/sites-available/ltropik
# Enable: ln -s /etc/nginx/sites-available/ltropik /etc/nginx/sites-enabled/ltropik

upstream ltropik_backend {
    server 127.0.0.1:5090;
    keepalive 32;
}

# ── HTTP: redirect to HTTPS (activate after SSL) ────────────────────────────
# Uncomment after running: certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# server {
#     listen 80;
#     listen [::]:80;
#     server_name yourdomain.com www.yourdomain.com;
#     return 301 https://$host$request_uri;
# }

# ── HTTP server (temporary — use before SSL is ready) ───────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    include /etc/nginx/snippets/ltropik-locations.conf;
}

